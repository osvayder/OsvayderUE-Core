name: MCP Bridge Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Plugins/OsvayderUE/Resources/mcp-bridge

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Plugins/OsvayderUE/Resources/mcp-bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
